<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ARCH_STRATEGIC_COMMAND_v21.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@100;300;500;700&display=swap');

        :root {
            --bg: #000;
            --line: rgba(255, 255, 255, 0.2);
            --font: 'Orbitron', 'Noto Sans KR', sans-serif;
            --accent: #fff;
        }

        /* --- 1. 기본 스타일 및 커서 제거 --- */
        * { box-sizing: border-box; outline: none; cursor: none !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #fff; }

        body {
            margin: 0; background: var(--bg); color: var(--accent);
            font-family: var(--font); height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; transition: 0.5s background, 0.3s filter;
        }

        /* --- 2. 움직이는 도트 배경 (요청 사항) --- */
        body::before {
            content: ""; position: fixed; width: 200%; height: 200%;
            background: radial-gradient(white 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.05;
            animation: moveBg 20s linear infinite; z-index: -1;
        }
        @keyframes moveBg { from { transform: translate(0,0); } to { transform: translate(-50px,-50px); } }

        /* --- 3. 커스텀 커서 (요청 사항) --- */
        #cursor {
            position: fixed; width: 30px; height: 30px; border: 1px solid #fff;
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 9999;
        }
        #cursor::after {
            content: ''; position: absolute; width: 5px; height: 5px;
            background: #fff; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        /* --- 4. SF 효과 & 글리치 --- */
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(255, 255, 255, 0.05) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 1000;
        }

        @keyframes screenBreak {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 3px); }
            40% { transform: translate(5px, -3px); }
            100% { transform: translate(0); }
        }
        .glitch-active { animation: screenBreak 0.1s infinite; }

        /* --- HEADER & VITALS --- */
        header {
            height: 60px; border-bottom: 2px solid #fff;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; background: #000; z-index: 100;
        }
        #vitals { font-size: 10px; color: rgba(255,255,255,0.7); text-align: right; line-height: 1.4; }
        .status-dot { color: #0f0; animation: pulseLine 1s infinite alternate; }

        /* --- MAIN LAYOUT (v18 보존) --- */
        #main-wrapper {
            display: grid; grid-template-columns: 350px 1fr 450px;
            flex: 1; overflow: hidden; gap: 1px; background: var(--line);
        }
        .panel { background: #000; padding: 20px; overflow-y: auto; position: relative; }

        /* --- TACTICAL NODES & ACTIVE STYLE --- */
        #tactical-display { display: flex; align-items: center; justify-content: center; }
        .node-net { width: 85%; height: 85%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .node {
            border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .node:hover { transform: scale(1.05); border-color: #fff; }
        
        /* 활성화 노드 스타일 (요청 사항) */
        .node.active { background: #fff !important; color: #000 !important; box-shadow: 0 0 25px #fff; }
        .node.active::after {
            content: ''; position: absolute; width: 120%; height: 120%; border: 1px solid #fff;
            animation: pulseLine 0.3s infinite alternate;
        }
        @keyframes pulseLine { from { opacity: 0.2; } to { opacity: 1; } }

        /* --- DATA OVERLAY --- */
        #data-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); display: none; padding: 60px; z-index: 500; border: 5px solid #fff;
        }

        /* --- OOC & SYNC BAR --- */
        #sync-bar-container { width: 100%; margin-bottom: 20px; }
        #sync-bar { width: 100%; height: 6px; background: #222; border: 1px solid #444; position: relative; }
        #sync-fill { width: 50%; height: 100%; background: #fff; transition: 0.5s; box-shadow: 0 0 10px #fff; }

        input, select, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 10px; font-family: inherit; }
        button { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: 900; cursor: pointer; }
        
        #ooc-terminal {
            flex: 1; margin-top: 20px; background: rgba(255,255,255,0.02); border: 1px solid #222;
            padding: 15px; font-family: monospace; font-size: 12px; height: 250px; overflow-y: auto;
        }

        /* --- 로딩 오버레이 --- */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: flex; align-items: center; justify-content: center;
            z-index: 10000; font-size: 14px; letter-spacing: 10px;
        }
    </style>
</head>
<body>

<div id="cursor"></div>
<div id="boot-screen">ACCESSING ARCH SYSTEM...</div>
<div class="scanline"></div>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <img src="「ARCH」 Symbol Logo White Ver.png" style="height:25px;">
        <span>ARCH_STRATEGIC_CONTROL_UNIT</span>
    </div>
    <div id="vitals">
        <span class="status-dot">●</span> SYSTEM_STATUS: ONLINE<br>
        HEART RATE: <span id="hr">72</span> BPM | TEMP: <span id="temp">36.5</span>℃
    </div>
</header>

<div id="main-wrapper">
    <div class="panel">
        <div style="font-weight:900; border-bottom:1px solid #fff; padding-bottom:5px; margin-bottom:15px;">DATABASE_INDEX</div>
        <div id="lore-list">
            </div>
    </div>

    <div id="tactical-display" class="panel">
        <div class="node-net" id="node-grid">
            </div>
        <div id="data-overlay">
            <div style="text-align:right;"><button onclick="closeLore()" style="width:auto; padding:5px 20px;">CLOSE [X]</button></div>
            <h2 id="ov-title">LOC_NAME</h2>
            <div id="ov-content">CONTENT</div>
        </div>
    </div>

    <div class="panel">
        <div style="font-weight:900; border-bottom:1px solid #fff; padding-bottom:5px; margin-bottom:15px;">MISSION_OOC_SYSTEM</div>
        <div id="sync-bar-container">
            <div style="font-size:9px; color:#666; margin-bottom:5px;">RESONANCE_SYNC</div>
            <div id="sync-bar"><div id="sync-fill"></div></div>
        </div>
        <input type="text" id="sName" placeholder="TARGET_SENTINEL">
        <input type="text" id="gName" placeholder="TARGET_GUIDE">
        <select id="mType">
            <option value="A">A-CLASS: IMMEDIATE DEPLOYMENT</option>
            <option value="S">S-CLASS: PARTNERSHIP TEST</option>
            <option value="K">CODE-BLACK: FORCED STABILIZATION</option>
        </select>
        <button onclick="generateOOC()">GENERATE_DOC</button>
        <div id="ooc-terminal">READY TO RECEIVE COMMAND...</div>
    </div>
</div>

<script>
    // --- v18 DATABASE (완벽 보존) ---
    const db = {
        loc_aegis: { t: "아이기스 (The Aegis)", c: "이동 요새 도시. 능력자들의 유일한 안식처이자 완벽한 감옥." },
        loc_train_sp: { t: "특별통제 훈련장", c: "위험 등급 센티넬을 위한 지하 격리 시설. 특수 합금 투기장." },
        loc_harmony: { t: "하모니 심리상담실", c: "트라우마 관리 및 파트너 관계 유지 전용 공간." },
        loc_stab: { t: "비상 안정화실", c: "오염도 80% 초과 개체 긴급 구속 및 강제 가이딩 시설." },
        loc_garden: { t: "하늘정원", c: "바람의 군주 이카로스가 발견한 고대 반중력 부유섬." },
        attr_fire: { t: "속성: 불 (FIRE)", c: "파괴력의 핵. 가이드는 공격력을 극대화하는 기폭제 역할을 함." },
        rank_van: { t: "뱅가드 (선봉대)", c: "'살아있는 전설'. 최강의 전투력과 깊은 고뇌를 지님." },
        secret_prima: { t: "🔓 ARCH_PRIMA_ROOT", c: "기밀 데이터 해제: 군주들의 기원은 [데이터 말소]와 연결되어 있습니다." }
    };

    const logs = [">> SIGNAL DETECTED", ">> SENTINEL HEART RATE SPIKE", ">> GUIDE LINK STABLE", ">> ERROR: UNKNOWN ENTITY", ">> SYNC RATE INCREASING"];
    let clickCount = 0;

    // --- 1. 커스텀 커서 로직 ---
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    // --- 2. 로딩 화면 (v18 보존을 위해 리로드 대신 오버레이 사용) ---
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('boot-screen').style.display = 'none';
        }, 1500);
    };

    // --- 3. 타이핑 효과 함수 ---
    function typeText(text, el) {
        let i = 0; el.innerText = "";
        let interval = setInterval(() => {
            el.innerText += text[i]; i++;
            if(i >= text.length) clearInterval(interval);
        }, 15);
    }

    // --- 4. 노드 생성 및 클릭 이벤트 (v18 기반 + 효과 추가) ---
    const grid = document.getElementById('node-grid');
    const nodes = ["THE AEGIS", "SPECIAL TRAIN", "TRAIN DOME", "HARMONY", "LOUNGE", "RESONANCE LAB", "STABILIZATION", "MEDICAL BAY", "PRIVATE ROOM", "CENTRAL CORE", "SKY GARDEN", "LOCKED"];
    
    nodes.forEach((name, i) => {
        let n = document.createElement('div');
        n.className = 'node';
        n.innerHTML = `<i>${String(i+1).padStart(2,'0')}</i><span>${name}</span>`;
        
        n.onclick = () => {
            clickCount++;
            // 클릭 카운트 효과 (요청 사항)
            if(clickCount > 10) document.body.style.filter = "contrast(1.5)";
            if(clickCount > 20) document.body.style.filter = "invert(1)";

            document.querySelectorAll('.node').forEach(node => node.classList.remove('active'));
            n.classList.add('active');

            // 12번 노드 시크릿 로직 (요청 사항)
            if(i === 11) {
                if(Math.random() > 0.5) {
                    alert("🔓 SECRET FILE UNLOCKED: ARCH_PRIMA DATA");
                    showLore('secret_prima');
                } else { alert("ACCESS DENIED"); }
            } else {
                showLore('loc_aegis'); // 샘플 출력
            }
        };
        grid.appendChild(n);
    });

    function showLore(key) {
        const overlay = document.getElementById('data-overlay');
        overlay.style.display = 'block';
        typeText(db[key].t, document.getElementById('ov-title'));
        typeText(db[key].c, document.getElementById('ov-content'));
    }

    function closeLore() { document.getElementById('data-overlay').style.display = 'none'; }

    // --- 5. 시스템 경고 알림 (15초/10초 루프) ---
    setInterval(() => {
        if (Math.random() < 0.15) alert("⚠ SYSTEM WARNING: UNSTABLE RESONANCE DETECTED");
    }, 15000);

    setInterval(() => {
        if(Math.random() < 0.1){
            alert("🚨 SENTINEL OVERLOAD DETECTED");
            document.body.classList.add('glitch-active');
            setTimeout(() => document.body.classList.remove('glitch-active'), 1000);
        }
    }, 10000);

    // --- 6. 바이탈 & 터미널 로그 업데이트 ---
    setInterval(() => {
        document.getElementById('hr').innerText = Math.floor(Math.random() * (110 - 65) + 65);
        document.getElementById('temp').innerText = (Math.random() * (38 - 36) + 36).toFixed(1);
    }, 2000);

    setInterval(() => {
        const term = document.getElementById('ooc-terminal');
        const log = logs[Math.floor(Math.random() * logs.length)];
        term.innerText += "\n" + log;
        term.scrollTop = term.scrollHeight;
    }, 3000);

    // --- 7. OOC 생성기 (v18 로직 유지) ---
    function generateOOC() {
        const s = document.getElementById('sName').value || "UNKNOWN";
        const sync = Math.floor(Math.random() * 100);
        document.getElementById('sync-fill').style.width = sync + "%";
        
        // 싱크 수치에 따른 배경색 변화
        if(sync > 85) document.body.style.background = "#200";
        else document.body.style.background = "#000";

        const term = document.getElementById('ooc-terminal');
        typeText(`[ ARCH MISSION ]\nTARGET: ${s}\nSYNC: ${sync}%\nSTATUS: PROCESSING...`, term);
    }
</script>

</body>
</html>
